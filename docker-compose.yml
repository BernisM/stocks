services:
  db:
    image: postgres:16-alpine
    container_name: stocks_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: stocks
      POSTGRES_USER: stocks
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stocks"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: stocks_app
    restart: unless-stopped
    env_file: .env
    environment:
      - SCHEDULER_FULL=true
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./ml_models:/app/ml_models
      - ./cache:/app/cache
      - ./templates:/app/templates
      - ./static:/app/static
    ports:
      - "8006:8006"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: stocks_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app

volumes:
  postgres_data:
