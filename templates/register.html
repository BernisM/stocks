<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inscription — StockAnalyzer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh">
  <div class="auth-card">
    <h2 class="text-center mb-1">📈 StockAnalyzer</h2>
    <p class="text-center text-muted mb-4">Créer votre compte</p>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="post" action="/register">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Mot de passe <span class="text-muted">(min. 8 caractères)</span></label>
        <input type="password" name="password" class="form-control" minlength="8" required>
      </div>
      <div class="mb-4">
        <label class="form-label">Votre niveau en trading</label>
        <select name="level" class="form-select">
          <option value="beginner">🟦 Débutant — explications simples</option>
          <option value="intermediate" selected>🟧 Intermédiaire — indicateurs techniques</option>
          <option value="expert">🟥 Expert — données complètes + ML</option>
        </select>
        <div class="form-text">Cela adapte le contenu des emails et du dashboard.</div>
      </div>
      <button type="submit" class="btn btn-primary w-100">Créer mon compte</button>
    </form>

    <p class="text-center mt-3 text-muted" style="font-size:14px">
      Déjà un compte ? <a href="/login">Se connecter</a>
    </p>
  </div>
</body>
</html>
