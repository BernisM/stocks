<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}StockAnalyzer{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

{% if user is defined and user %}
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold" href="/dashboard">📈 StockAnalyzer</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/dashboard' %}active{% endif %}" href="/dashboard">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/portfolio' %}active{% endif %}" href="/portfolio">Portefeuille</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/backtest' %}active{% endif %}" href="/backtest">Backtesting</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/guide' %}active{% endif %}" href="/guide">Guide</a>
        </li>
        {% if user.email == "marvin.bernis95@gmail.com" %}
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/recipients' %}active{% endif %}" href="/recipients">Destinataires</a>
        </li>
        {% endif %}
      </ul>
      <ul class="navbar-nav align-items-center gap-2">
        <li class="nav-item d-flex gap-1">
          <button class="theme-btn" data-theme-target="dark">🌙 Dark</button>
          <button class="theme-btn" data-theme-target="light">☀️ Light</button>
          <button class="theme-btn" data-theme-target="beige">🍂 Beige</button>
        </li>
        <li class="nav-item">
          <span class="nav-link text-muted">
            {{ user.email }}
            <span class="badge-level badge-{{ user.level }}">{{ user.level }}</span>
          </span>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/logout">Déconnexion</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
{% endif %}

<main class="container-fluid px-4 py-4">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ── Thème ────────────────────────────────────────────────────────────────────
  (function () {
    const root  = document.documentElement;
    const saved = localStorage.getItem('theme') || 'dark';
    root.setAttribute('data-theme', saved);
    document.querySelectorAll('[data-theme-target]').forEach(btn => {
      const t = btn.dataset.themeTarget;
      if (t === saved) btn.classList.add('active');
      btn.addEventListener('click', () => {
        root.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
        document.querySelectorAll('[data-theme-target]').forEach(b =>
          b.classList.toggle('active', b.dataset.themeTarget === t));
      });
    });
  })();

  // ── Notifications navigateur ─────────────────────────────────────────────────
  function _notify(title, body) {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'granted') {
      new Notification(title, { body: body || '', icon: '/static/favicon.ico' });
    }
  }

  // Demande la permission au premier clic sur un bouton admin
  function _ensureNotifPerm(then) {
    if (!('Notification' in window))           { then && then(); return; }
    if (Notification.permission === 'granted') { then && then(); return; }
    if (Notification.permission === 'denied')  { then && then(); return; }
    Notification.requestPermission().then(() => { then && then(); });
  }
</script>
</body>
</html>
